    <body>
        <div class="container">
            <h1>My todoList</h1>

            <div class="row">
                <input type="text" id="todoInput" class="col-9 p-2"/>
                <button id="todoAdd" class="col-2 justify-content-md-end ms-auto btn btn-primary">Ajouter</button>
            </div>
            
            <div class="row m-2">
                <ul id="todoList"></ul>
            </div>

            <div class="row">
                <select id="filterInput" class="col-3">
                    <option>toutes</option>
                    <option value="1">terminées</option>
                    <option value="2">actives</option>
                </select>
            </div>

            <div class="row">
                <button id="delAllBtn" class="mx-auto p-2 col-5 btn btn-danger">Tout supprimmer</button>
            </div>
        </div>

        <script src="./assets/js/localStorage.js"></script>
    </body>
